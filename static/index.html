<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SearchAssistant – Pintakäsittely</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --primary: #4f8ff7;
    --primary-dim: #2a5db0;
    --text: #e4e6eb;
    --text-dim: #8b8fa3;
    --user-bg: #2a3a5c;
    --bot-bg: #1e2330;
    --source-bg: #161922;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: row;
    overflow: hidden;
  }

  /* Sidebar */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  #sidebar .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #sidebar .sidebar-header h2 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  #new-session-btn {
    background: var(--primary);
    border: none;
    color: #fff;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 600;
  }
  #new-session-btn:hover { opacity: 0.9; }
  #session-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .session-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 4px;
    transition: background 0.15s;
  }
  .session-item:hover { background: var(--border); }
  .session-item.active { background: var(--primary-dim); }
  .session-item .si-title {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .session-item .si-time {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .session-item .si-summary {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .session-item .si-delete {
    float: right;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    padding: 0 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .session-item:hover .si-delete { opacity: 1; }
  .session-item .si-delete:hover { color: #e74c3c; }

  /* Main content column */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header .logo {
    font-size: 24px;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
  }
  header span.sub {
    color: var(--text-dim);
    font-size: 13px;
  }

  /* Chat area */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .msg {
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    gap: 12px;
  }
  .msg.user { justify-content: flex-end; }
  .msg.bot  { justify-content: flex-start; }

  .msg .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .msg.user .avatar { background: var(--primary-dim); }
  .msg.bot  .avatar { background: #2d3340; }

  .msg .bubble {
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.6;
    font-size: 14px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .bubble {
    background: var(--user-bg);
    border-bottom-right-radius: 4px;
  }
  .msg.bot .bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  /* Sources */
  .sources {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .sources summary {
    cursor: pointer;
    color: var(--text-dim);
    font-size: 12px;
  }
  .source-item {
    background: var(--source-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
  }
  .source-item .src-title {
    font-weight: 600;
    color: var(--primary);
  }
  .source-item .src-score {
    color: var(--text-dim);
    float: right;
  }
  .source-item .src-text {
    color: var(--text-dim);
    margin-top: 4px;
    max-height: 60px;
    overflow: hidden;
  }
  .source-item a {
    color: var(--primary);
    text-decoration: none;
    font-size: 11px;
  }

  /* Input area */
  #input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 24px;
  }
  #input-wrap {
    max-width: 780px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
  }
  #input-wrap input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  #input-wrap input:focus {
    border-color: var(--primary);
  }
  #input-wrap button {
    padding: 12px 24px;
    border: none;
    border-radius: 10px;
    background: var(--primary);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  #input-wrap button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Loading dots */
  .loading span {
    animation: blink 1.4s infinite both;
    font-size: 20px;
  }
  .loading span:nth-child(2) { animation-delay: 0.2s; }
  .loading span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }
</style>
<!-- KaTeX CSS ja JS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>

<div id="sidebar">
  <div class="sidebar-header">
    <h2>Keskustelut</h2>
    <button id="new-session-btn" onclick="startNewSession()">+ Uusi</button>
  </div>
  <div id="session-list"></div>
</div>

<div id="main">

<header>
  <div class="logo">⚡</div>
  <div>
    <h1>SearchAssistant</h1>
    <span class="sub">Sähkökemiallinen pintakäsittely – tietokanta</span>
  </div>
</header>

<div id="chat">
  <div class="msg bot">
    <div class="avatar">🤖</div>
    <div class="bubble">Hei! Kysy minulta sähkökemiallisesta pintakäsittelystä – esim. galvanoinnista, anodisoinnista, passivioinnista tai turvallisuudesta.</div>
  </div>
</div>

<div id="input-area">
  <div id="input-wrap">
    <input id="q" type="text" placeholder="Kirjoita kysymys..." autofocus />
    <button id="btn" onclick="ask()">Kysy</button>
  </div>
</div>

</div> <!-- /main -->

<script>
const chat = document.getElementById('chat');
const qInput = document.getElementById('q');
const btn = document.getElementById('btn');

// ── Session state ──
let currentSessionId = null;

qInput.addEventListener('keydown', e => { if (e.key === 'Enter') ask(); });

function renderMath(element) {
  if (window.renderMathInElement) {
    renderMathInElement(element, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '\\[', right: '\\]', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\(', right: '\\)', display: false}
      ],
      throwOnError: false
    });
  }
}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatarDiv = document.createElement('div');
  avatarDiv.className = 'avatar';
  avatarDiv.textContent = role === 'user' ? '👤' : '🤖';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  div.appendChild(avatarDiv);
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  if (role === 'bot') {
    renderMath(bubble);
  }
  return div;
}

function addLoading() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'loading';
  div.innerHTML = `<div class="avatar">🤖</div><div class="bubble"><span class="loading"><span>●</span><span>●</span><span>●</span></span></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function ask() {
  const q = qInput.value.trim();
  if (!q) return;
  qInput.value = '';
  btn.disabled = true;

  addMsg('user', q);
  const loader = addLoading();

  try {
    const body = {
      question: q,
      session_id: currentSessionId,
      k: 5
    };

    const resp = await fetch('/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    // Track session
    if (data.session_id) {
      currentSessionId = data.session_id;
    }

    loader.remove();

    const botDiv = addMsg('bot', data.answer);

    if (data.sources && data.sources.length) {
      const bubble = botDiv.querySelector('.bubble');
      const details = document.createElement('details');
      details.className = 'sources';

      const summary = document.createElement('summary');
      summary.textContent = `📎 Lähteet (${data.sources.length})`;
      details.appendChild(summary);

      for (const s of data.sources) {
        const item = document.createElement('div');
        item.className = 'source-item';

        const score = document.createElement('span');
        score.className = 'src-score';
        score.textContent = `${(s.score * 100).toFixed(0)}%`;

        const title = document.createElement('div');
        title.className = 'src-title';
        title.textContent = s.title || 'Tuntematon';

        const text = document.createElement('div');
        text.className = 'src-text';
        text.textContent = s.content.slice(0, 200) + '…';

        const link = document.createElement('a');
        link.href = s.source_url;
        link.target = '_blank';
        link.rel = 'noopener';
        link.textContent = '🔗 Avaa lähde';

        item.appendChild(score);
        item.appendChild(title);
        item.appendChild(text);
        item.appendChild(link);
        details.appendChild(item);
      }
      bubble.appendChild(details);
    }

    // Refresh sidebar after each answer
    loadSessions();
  } catch (err) {
    loader.remove();
    addMsg('bot', `⚠️ Virhe: ${err.message}`);
  }
  btn.disabled = false;
  qInput.focus();
}

// ── Session management ──

function startNewSession() {
  currentSessionId = null;
  chat.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'msg bot';
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = '🤖';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = 'Uusi keskustelu aloitettu. Kysy minulta sähkökemiallisesta pintakäsittelystä!';
  div.appendChild(avatar);
  div.appendChild(bubble);
  chat.appendChild(div);
  document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
  qInput.focus();
}

async function loadSessions() {
  try {
    const resp = await fetch('/sessions');
    if (!resp.ok) return;
    const sessions = await resp.json();
    const list = document.getElementById('session-list');
    list.innerHTML = '';
    for (const s of sessions) {
      const item = document.createElement('div');
      item.className = 'session-item';
      if (s.id === currentSessionId) item.classList.add('active');

      const del = document.createElement('button');
      del.className = 'si-delete';
      del.textContent = '✕';
      del.title = 'Poista keskustelu';
      del.onclick = (e) => { e.stopPropagation(); deleteSession(s.id); };

      const title = document.createElement('div');
      title.className = 'si-title';
      title.textContent = s.title || 'Nimetön';

      const time = document.createElement('div');
      time.className = 'si-time';
      const d = new Date(s.updated_at);
      time.textContent = d.toLocaleDateString('fi-FI') + ' ' +
        d.toLocaleTimeString('fi-FI', {hour:'2-digit', minute:'2-digit'});

      item.appendChild(del);
      item.appendChild(title);
      item.appendChild(time);

      if (s.summary) {
        const sum = document.createElement('div');
        sum.className = 'si-summary';
        sum.textContent = s.summary;
        item.appendChild(sum);
      }

      item.onclick = () => loadSession(s.id);
      list.appendChild(item);
    }
  } catch (e) {
    console.error('Failed to load sessions:', e);
  }
}

async function loadSession(sessionId) {
  try {
    const resp = await fetch(`/sessions/${sessionId}`);
    if (!resp.ok) return;
    const data = await resp.json();

    currentSessionId = sessionId;
    chat.innerHTML = '';

    // Show session summary as context hint
    if (data.session.summary) {
      const infoDiv = document.createElement('div');
      infoDiv.className = 'msg bot';
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = '📝';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.style.fontStyle = 'italic';
      bubble.style.borderColor = 'var(--primary-dim)';
      bubble.textContent = '📝 Tiivistelmä: ' + data.session.summary;
      infoDiv.appendChild(avatar);
      infoDiv.appendChild(bubble);
      chat.appendChild(infoDiv);
    }

    // Render all messages
    for (const m of data.messages) {
      const role = m.role === 'user' ? 'user' : 'bot';
      addMsg(role, m.content);
    }

    loadSessions(); // refresh active state
  } catch (e) {
    console.error('Failed to load session:', e);
  }
}

async function deleteSession(sessionId) {
  if (!confirm('Poistetaanko keskustelu?')) return;
  try {
    await fetch(`/sessions/${sessionId}`, { method: 'DELETE' });
    if (sessionId === currentSessionId) {
      startNewSession();
    }
    loadSessions();
  } catch (e) {
    console.error('Failed to delete session:', e);
  }
}

// Load sessions on page load
window.addEventListener('load', () => {
  setTimeout(loadSessions, 500);
});
</script>
</body>
</html>
